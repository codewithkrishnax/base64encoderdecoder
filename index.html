<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pro Base64 Tool</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  /* Enforced Dark Mode Palette */
  --bg: #111113;
  --surface: #18181b;
  --border: #27272a;
  --text: #fafafa;
  --sub: #a1a1aa;
  --muted: #52525b;
  --hover: #27272a;
  --accent: #f4f4f5;
  --accent-text: #111113;
  --blue: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
}

html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg); font-family: var(--sans);
  -webkit-font-smoothing: antialiased; color: var(--text);
}

.app {
  display: flex; flex-direction: column;
  height: 100dvh; width: 100vw;
  background: var(--bg);
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

/* ── Top Bar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 40;
}

.topbar-title { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; color: var(--text); }
.topbar-sub { font-size: 12px; color: var(--sub); font-weight: 500; margin-left: 8px; }

/* ── Main Content (Full Width & Height) ── */
.main-content {
  flex: 1; min-height: 0; display: flex; flex-direction: column;
  padding: 24px; overflow-y: auto; align-items: stretch;
}

.content-wrapper {
  width: 100%; max-width: 100%; flex: 1; /* Takes full width and height */
  display: flex; flex-direction: column; gap: 16px;
}

/* ── Segment Toggle ── */
.segment {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 4px; display: flex; position: relative; flex-shrink: 0;
}
.seg-track {
  position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px);
  background: var(--hover); border-radius: 6px;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.seg-track.right { transform: translateX(100%); }
.seg-btn {
  flex: 1; padding: 10px 0; border: none; background: transparent;
  font-family: var(--sans); font-size: 13.5px; font-weight: 600;
  color: var(--sub); cursor: pointer; position: relative; z-index: 1;
  transition: color 0.2s;
}
.seg-btn.active { color: var(--text); }

/* ── Cards (Flex Grow to fill height) ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; display: flex; flex-direction: column; overflow: hidden;
  flex: 1; /* Stretches to fill vertical space */
  min-height: 200px;
}

textarea {
  flex: 1; width: 100%; border: none; outline: none; background: transparent;
  resize: none; display: block; font-family: var(--mono); font-size: 14px;
  line-height: 1.6; color: var(--text); padding: 16px; caret-color: var(--accent);
}
textarea::placeholder { font-family: var(--sans); font-size: 14px; color: var(--muted); }

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-top: 1px solid var(--border); background: var(--bg);
  flex-shrink: 0;
}
.chips { display: flex; gap: 8px; }
.chip {
  height: 28px; padding: 0 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; font-family: var(--sans); font-size: 12px; font-weight: 600;
  color: var(--text); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.chip:hover { background: var(--hover); }
.chip:active { transform: scale(0.95); }
.meta { font-size: 12px; font-weight: 500; color: var(--sub); font-family: var(--mono); }

/* ── Action Button ── */
.action-btn {
  width: 100%; padding: 16px; border: none; border-radius: 10px; flex-shrink: 0;
  background: var(--accent); color: var(--accent-text);
  font-family: var(--sans); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s, transform 0.12s;
}
.action-btn:hover { opacity: 0.9; }
.action-btn:active { transform: scale(0.98); }

/* ── Error Box ── */
.err {
  display: none; align-items: flex-start; gap: 10px;
  background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
  border-radius: 10px; padding: 12px 16px; flex-shrink: 0;
}
.err.show { display: flex; }
.err-icon {
  width: 20px; height: 20px; border-radius: 50%; background: var(--red);
  color: #fff; font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.err-text { font-size: 13px; font-weight: 500; color: var(--red); line-height: 1.5; }

/* ── Output ── */
.out-header {
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  padding: 12px 16px; background: var(--bg); border-bottom: 1px solid var(--border);
}
.out-label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2); }
.dot.on { background: var(--green); box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }

.out-body {
  flex: 1; overflow-y: auto;
  padding: 16px; font-family: var(--mono); font-size: 14.5px; line-height: 1.6;
  color: var(--text); word-break: break-all;
}
.out-body.empty { font-family: var(--sans); color: var(--muted); font-style: italic; }

/* ── Mobile adjustments ── */
@media (max-width: 768px) {
  .main-content { padding: 16px; }
  .card { min-height: 180px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <div>
      <span class="topbar-title">Base64</span>
      <span class="topbar-sub">Encoder & Decoder</span>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="content-wrapper">
      
      <!-- Mode Toggle -->
      <div class="segment">
        <div class="seg-track" id="track"></div>
        <button class="seg-btn active" onclick="setMode('encode')">Encode</button>
        <button class="seg-btn" onclick="setMode('decode')">Decode</button>
      </div>

      <!-- Input Card -->
      <div class="card">
        <textarea id="input" placeholder="Enter text here…" oninput="onInput()" spellcheck="false"></textarea>
        <div class="card-footer">
          <div class="chips">
            <button class="chip" onclick="pasteText()">
              <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
              Paste
            </button>
            <button class="chip" onclick="clearAll()">
              <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--red);fill:none;stroke-width:2;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              Clear
            </button>
          </div>
          <span class="meta" id="meta">0 chars</span>
        </div>
      </div>

      <!-- Action Button -->
      <button class="action-btn" onclick="convert()" id="convertBtn">Encode to Base64</button>

      <!-- Error Message -->
      <div class="err" id="err">
        <div class="err-icon">!</div>
        <div class="err-text" id="errText"></div>
      </div>

      <!-- Output Card -->
      <div class="card">
        <div class="out-header">
          <div class="out-label">
            <div class="dot" id="dot"></div>
            <span id="outLabel">Result</span>
          </div>
          <button class="chip" id="copyBtn" onclick="copyOut()" style="height: 26px;">
            <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" /></svg>
            Copy
          </button>
        </div>
        <div class="out-body empty" id="output">Output will appear here</div>
      </div>

    </div>
  </div>
</div>

<script>
  let mode = "encode";

  function setMode(m) {
    mode = m;
    document.getElementById("track").classList.toggle("right", m === "decode");
    document.querySelectorAll(".seg-btn").forEach((b, i) => b.classList.toggle("active", (i === 0) === (m === "encode")));
    
    document.getElementById("convertBtn").textContent = m === "encode" ? "Encode to Base64" : "Decode from Base64";
    document.getElementById("input").placeholder = m === "encode" ? "Enter text here…" : "Paste Base64 string…";
    
    clearAll();
  }

  function onInput() {
    const v = document.getElementById("input").value;
    document.getElementById("meta").textContent = v.length + " chars";
    document.getElementById("err").classList.remove("show");
  }

  function convert() {
    const input = document.getElementById("input").value;
    const out = document.getElementById("output");
    document.getElementById("err").classList.remove("show");
    
    if (!input.trim()) {
      resetOut();
      return;
    }
    
    try {
      const result = mode === "encode"
          ? btoa(unescape(encodeURIComponent(input)))
          : decodeURIComponent(escape(atob(input.trim())));
          
      out.textContent = result;
      out.classList.remove("empty");
      document.getElementById("dot").classList.add("on");
      document.getElementById("outLabel").textContent = mode === "encode" ? "Encoded Result" : "Decoded Result";
    } catch {
      resetOut();
      document.getElementById("errText").textContent = mode === "decode"
          ? "Invalid Base64 string. Check your input and try again."
          : "Encoding failed. Input may contain unsupported characters.";
      document.getElementById("err").classList.add("show");
    }
  }

  function resetOut() {
    const out = document.getElementById("output");
    out.textContent = "Output will appear here";
    out.classList.add("empty");
    document.getElementById("dot").classList.remove("on");
    document.getElementById("outLabel").textContent = "Result";
    resetCopy();
  }

  function clearAll() {
    document.getElementById("input").value = "";
    document.getElementById("meta").textContent = "0 chars";
    document.getElementById("err").classList.remove("show");
    resetOut();
  }

  async function pasteText() {
    try {
      const t = await navigator.clipboard.readText();
      document.getElementById("input").value = t;
      onInput();
    } catch {
      document.getElementById("input").focus();
    }
  }

  async function copyOut() {
    const out = document.getElementById("output");
    if (out.classList.contains("empty")) return;
    
    try {
      await navigator.clipboard.writeText(out.textContent);
      const btn = document.getElementById("copyBtn");
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied`;
      btn.style.color = "var(--green)";
      setTimeout(resetCopy, 2000);
    } catch {}
  }

  function resetCopy() {
    const btn = document.getElementById("copyBtn");
    btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" /></svg> Copy`;
    btn.style.color = "";
  }
</script>
</body>
</html>
